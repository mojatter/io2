version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosec
  settings:
    gosec:
      excludes:
        - G104
    staticcheck:
      checks:
        - all
        - -QF1011 # explicit interface type on `_ = ...` is intentional (interface satisfaction check)
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gosec

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
